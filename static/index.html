<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로컬 이미지 스튜디오</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div class="app" id="app">

  <!-- ── 좌측 사이드바 (접기/펼치기) ────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <button class="icon-btn" id="collapseBtn" title="사이드바 접기/펼치기">☰</button>
      <span class="brand">🎨 이미지 스튜디오</span>
    </div>

    <button class="new-project-btn" id="newProjectBtn">＋ 새 리스트</button>

    <nav class="proj-list" id="projList">
      <div class="proj-item active" data-pid="all">
        <span class="proj-name">📁 전체 이미지</span>
      </div>
      <div class="proj-item" data-pid="fav">
        <span class="proj-name">⭐ 즐겨찾기</span>
      </div>
      <!-- 사용자 프로젝트가 여기에 렌더됨 -->
    </nav>

    <div class="sidebar-foot">
      <div class="auth-chip" id="authChip" title="로그인 상태">…</div>
      <button class="icon-btn" id="manualBtn" title="프롬프트 매뉴얼 (새 탭)">📖</button>
      <button class="icon-btn" id="settingsBtn" title="설정">⚙️</button>
    </div>
  </aside>

  <!-- ── 메인 ───────────────────────────────────────────────── -->
  <main class="main">
    <header class="main-head">
      <button class="icon-btn only-collapsed" id="expandBtn" title="사이드바 펼치기">☰</button>
      <h1 id="viewTitle">전체 이미지</h1>
      <div class="head-actions" id="headActions" hidden>
        <button class="ghost-btn" id="favBtn">⭐ 즐겨찾기</button>
        <a class="ghost-btn" id="downloadBtn" download>⬇ 다운로드</a>
        <button class="ghost-btn danger" id="deleteBtn">🗑 삭제</button>
      </div>
    </header>

    <section class="stage" id="stage">
      <!-- 갤러리 그리드 (기본) -->
      <div class="gallery" id="gallery"></div>

      <!-- 단일 이미지 뷰 + 편집 -->
      <div class="viewer" id="viewer" hidden>
        <div class="canvas-wrap" id="canvasWrap">
          <img id="viewerImg" alt="" />
          <canvas id="maskCanvas"></canvas>
        </div>

        <aside class="edit-panel">
          <button class="link-btn" id="backToGallery">← 갤러리로</button>

          <h3>✏️ 자연어 수정</h3>
          <textarea id="editInstruction" rows="3"
            placeholder="예: 배경을 노을 지는 해변으로 바꿔줘"></textarea>

          <div class="mask-row">
            <label><input type="checkbox" id="maskToggle" /> 🖱 영역 칠해서 수정</label>
            <span class="mask-tools" id="maskTools" hidden>
              브러시 <input type="range" id="brushSize" min="8" max="80" value="34" />
              <button class="link-btn" id="clearMask">지우기</button>
            </span>
          </div>
          <p class="hint" id="maskHint" hidden>
            이미지 위에서 마우스로 수정할 영역을 칠한 뒤 ‘적용’을 누르세요.
            (gpt-image-2 는 전용 마스크가 없어, 칠한 영역을 강조해 함께 전달합니다.)
          </p>

          <button class="primary-btn" id="applyEditBtn">적용 (수정 생성)</button>

          <h3>🧬 버전 히스토리</h3>
          <div class="lineage" id="lineage"></div>
        </aside>
      </div>
    </section>

    <!-- ── 하단 GPT형 입력창 ─────────────────────────────────── -->
    <footer class="composer">
      <button class="plus-btn" id="plusBtn" title="가져오기 / 병합">＋</button>
      <textarea id="promptInput" rows="1"
        placeholder="만들고 싶은 이미지를 설명하세요…  (Enter 전송 · Shift+Enter 줄바꿈)"></textarea>
      <select id="sizeSelect" title="크기/비율"></select>
      <button class="send-btn" id="sendBtn">생성 ↑</button>
    </footer>
  </main>
</div>

<!-- ── 병합/가져오기 모달 ─────────────────────────────────────── -->
<div class="modal" id="mergeModal" hidden>
  <div class="modal-box">
    <div class="modal-head"><h2>＋ 가져오기 / 병합</h2><button class="icon-btn" id="mergeClose">✕</button></div>
    <p class="hint">병합할 이미지를 선택하고(여러 장 가능) 지시문을 입력하면 한 장으로 합성합니다.</p>
    <div class="picker" id="mergePicker"></div>
    <textarea id="mergePrompt" rows="2" placeholder="예: 두 이미지를 자연스럽게 한 장면으로 합성해줘"></textarea>
    <div class="modal-foot">
      <span class="sel-count" id="mergeCount">선택: 0</span>
      <button class="primary-btn" id="mergeRun">병합 생성</button>
    </div>
  </div>
</div>

<!-- ── 설정 모달 ──────────────────────────────────────────────── -->
<div class="modal" id="settingsModal" hidden>
  <div class="modal-box">
    <div class="modal-head"><h2>⚙️ 설정</h2><button class="icon-btn" id="settingsClose">✕</button></div>

    <div class="auth-status" id="authStatus"></div>

    <label class="field">엔진
      <select id="engineSelect">
        <option value="codex">Codex / ChatGPT (키리스 · 구독 할당량)</option>
        <option value="gemini">Gemini (Google AI Studio 무료 키)</option>
      </select>
    </label>

    <label class="field">기본 크기/비율
      <select id="defSizeSelect"></select>
    </label>

    <div class="gemini-fields" id="geminiFields" hidden>
      <label class="field">Gemini API 키
        <input type="password" id="geminiKey" placeholder="AI Studio 무료 키 (선택)" />
      </label>
    </div>

    <div class="modal-foot">
      <span class="hint" id="settingsMsg"></span>
      <button class="primary-btn" id="settingsSave">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" hidden></div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
